# ═══════════════════════════════════════════════════════════════
# Каждая награда имеет следующие параметры (все, кроме period,
# могут быть удалены, если не нужны):
#
#   period - Интервал выдачи (примеры: "30m", "1h", "2h", "1d")
#            Поддерживаются: s (секунды), m (минуты), h (часы), d (дни)
#
#   detect_afk - true = учитывается только активное время (по умолч.)
#                false = время идёт независимо от AFK
#
#   time_range - Интервал, в который доступна награда.
#                Формат: "HH:mm-HH:mm" (пример: "18:00-22:00").
#                Удали строку, чтобы награда была доступна всегда.
#
#   permission - Право, необходимое для получения награды.
#                Если параметр отсутствует — награда доступна всем.
#
#   repetitive - true = выдается каждые period (по умолч.)
#                false = выдается один раз за опред. время
#
#   message - Сообщение игроку. Поддерживаются HEX-цвета (&#RRGGBB),
#             &-коды и плейсхолдер %player_name%.
#
#   commands - Список консольных команд.
#              Плейсхолдеры: %player_name%
# ═══════════════════════════════════════════════════════════════

rewards:

  diamond:
    period: "1h"
    detect_afk: true
    time_range: "18:00-22:00"
    permission: "swrewards.vip"
    repetitive: true
    message: "&#7dc16a| &fДержи &#7dc16aалмазик &fза час игры здесь! &#7dc16a:>"
    commands:
      - "give %player_name% minecraft:diamond 1"

  emerald:
    period: "2h"
    detect_afk: false
    repetitive: true
    message: "&#7dc16a| &fТы получил &#7dc16aизумруд &fза 2 часа игры!"
    commands:
      - "give %player_name% minecraft:emerald 1"

  welcome_cases:
    period: "10h"
    detect_afk: true
    repetitive: false
    message: "&#7dc16a| &fТы наиграл &#7dc16a10 часов&f! Держи кейсы!"
    commands:
      - "give %player_name% case 3"


# ══════════════════════════════════════════════════ #
#  Награда за возвращение после долгого отсутствия   #
# ══════════════════════════════════════════════════ #

welcome-back:
  enabled: true # Включить / выключить функцию
  check-period: "7d" # Отсутствовал минимум 7 дней
  reward-mode: "ALL" # ALL — выполнить все команды | RANDOM — случайная команда из списка
  message: "&#7dc16a| &fИгрок &#7dc16a%player_name% &fвернулся спустя долгое время и получил награду!"
  commands:
    - "give %player_name% minecraft:diamond 1"
    - "give %player_name% minecraft:emerald 1"
